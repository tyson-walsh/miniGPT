name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    # You can specify paths if you only want to trigger on changes to certain files
    # paths:
    #   - 'miniGPT_dockerfile'
    #   - 'requirements.txt'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: miniGPT_dockerfile         # This is crucial since your file is not named 'Dockerfile'
          push: true
          tags: docker.io/${{ secrets.DOCKER_USERNAME }}/minigpt:latest
